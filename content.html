<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content | Portfolio</title>
  <meta name="description" content="Rendered markdown content page.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <header>
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Your Name</a>
      <nav aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Start</a></li>
          <li><a href="about.html">About Me</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="creative.html">Creative</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 id="content-title">Content</h1>
    <div id="content-body" class="blog-item blog-content" aria-live="polite">
      <p>Loading content...</p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> Your Name. Built for GitHub Pages.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="assets/site.js"></script>
  <script>
    (async function loadSingleMarkdown() {
      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      const title = params.get("title");
      const titleEl = document.getElementById("content-title");
      const bodyEl = document.getElementById("content-body");

      if (title) {
        titleEl.textContent = title;
        document.title = title + " | Portfolio";
      }

      if (!file) {
        bodyEl.innerHTML = "<p>No markdown file specified.</p>";
        return;
      }

      try {
        const safePath = file.replace(/\\/g, "/");
        const response = await fetch(safePath);
        if (!response.ok) {
          throw new Error("Could not load markdown file: " + safePath);
        }

        const markdown = await response.text();
        if (window.marked && typeof window.marked.parse === "function") {
          bodyEl.innerHTML = window.marked.parse(markdown);
        } else {
          bodyEl.textContent = markdown;
        }
      } catch (error) {
        bodyEl.innerHTML = "<p>Could not load this markdown file. Check the path and try again.</p>";
        console.error(error);
      }
    }());
  </script>
</body>
</html>
